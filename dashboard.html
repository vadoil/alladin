<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alladin — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F1EB;--bg2:#EDE9E0;--bg3:#E5E0D4;
  --ink:#1C1917;--ink2:#44403C;--ink3:#78716C;
  --line:rgba(28,25,23,.1);
  --acc:#C2501F;--acc2:#E07040;
  --green:#2D6A4F;--red:#A32D2D;
  --sans:'Plus Jakarta Sans',sans-serif;
  --head:'Unbounded',sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}

/* topbar */
.topbar{height:52px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50}
.logo{font-family:var(--head);font-size:13px;font-weight:700;text-decoration:none;color:var(--ink)}
.logo sup{font-family:var(--mono);font-size:7px;color:var(--acc);vertical-align:super}
.tb-right{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .15s;text-decoration:none}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{background:var(--acc2)}
.btn-ghost{background:#fff;color:var(--ink2);border:1px solid var(--line)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:rgba(163,45,45,.1);color:var(--red);border:1px solid rgba(163,45,45,.2)}.btn-danger:hover{background:rgba(163,45,45,.18)}

/* layout */
.page{max-width:1100px;margin:0 auto;padding:32px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-family:var(--head);font-size:18px;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:13px;color:var(--ink3);margin-top:3px;font-weight:300}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.metric{background:var(--bg2);border-radius:10px;padding:16px 18px}
.metric-n{font-family:var(--head);font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--ink);margin-bottom:4px}
.metric-l{font-size:12px;color:var(--ink3);font-weight:300}

/* table */
.table-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:10px 16px;font-size:11px;font-weight:500;color:var(--ink3);text-align:left;border-bottom:1px solid var(--line);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid rgba(28,25,23,.05);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px}
.badge-ready{background:rgba(45,106,79,.1);color:var(--green)}
.badge-err{background:rgba(163,45,45,.1);color:var(--red)}

.site-id{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:.04em}
.niche-cell{font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.actions{display:flex;gap:6px;flex-wrap:nowrap}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 20px;text-align:center;color:var(--ink3)}
.empty svg{opacity:.25;margin-bottom:16px}
.empty-t{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px}
.empty-s{font-size:13px;font-weight:300;max-width:280px;line-height:1.6}

/* generate panel */
.gen-panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:24px;display:none}
.gen-panel.open{display:block}
.gen-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.gen-input{flex:1;min-width:200px;border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:14px;font-family:var(--sans);color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.gen-input:focus{border-color:var(--acc);background:#fff}

/* progress */
.progress-bar{height:3px;background:var(--acc);border-radius:2px;width:0;transition:width .4s ease;margin-top:10px}
.gen-status{font-size:12px;color:var(--ink3);font-family:var(--mono);margin-top:8px;min-height:18px}

/* preview iframe modal */
.preview-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(28,25,23,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px}
.preview-modal.open{display:flex}
.preview-box{background:#fff;border-radius:14px;width:100%;max-width:960px;height:85vh;display:flex;flex-direction:column;overflow:hidden}
.preview-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.preview-url{flex:1;font-family:var(--mono);font-size:11px;color:var(--ink3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-iframe{flex:1;border:none;width:100%}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:none}

@media(max-width:700px){
  .metrics{grid-template-columns:1fr 1fr}
  .topbar,.page{padding-left:20px;padding-right:20px}
  th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="/">Alladin<sup>AI</sup></a>
  <div class="tb-right">
    <button class="btn btn-ghost btn-sm" onclick="toggleGen()">+ Новый сайт</button>
    <button class="btn btn-ghost btn-sm" onclick="load()">↺ Обновить</button>
    <a class="btn btn-acc btn-sm" href="/">← Главная</a>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Панель управления</div>
      <div class="page-sub" id="sub-text">Загрузка…</div>
    </div>
  </div>

  <!-- Generate panel -->
  <div class="gen-panel" id="gen-panel">
    <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px">Сгенерировать новый сайт</div>
    <div style="font-size:12px;color:var(--ink3)">AI создаст лендинг из маркетингового blueprint по нише</div>
    <div class="gen-row">
      <input class="gen-input" id="gen-niche" placeholder="Ниша: юрист, ремонт, психолог…" onkeydown="if(event.key==='Enter')generate()">
      <input class="gen-input" id="gen-geo" placeholder="Гео (необязательно)" style="max-width:180px">
      <button class="btn btn-acc" onclick="generate()" id="gen-btn">Создать сайт →</button>
    </div>
    <div class="progress-bar" id="progress"></div>
    <div class="gen-status" id="gen-status"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-n" id="m-total">—</div><div class="metric-l">Всего сайтов</div></div>
    <div class="metric"><div class="metric-n" id="m-today">—</div><div class="metric-l">Сегодня</div></div>
    <div class="metric"><div class="metric-n" id="m-avg">—</div><div class="metric-l">Среднее время генерации</div></div>
    <div class="metric"><div class="metric-n" id="m-api" style="font-size:18px">●</div><div class="metric-l">Статус API</div></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div id="table-body">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M3 7h18"/></svg>
        <div class="empty-t">Загрузка…</div>
        <div class="empty-s">Получаем список сайтов</div>
      </div>
    </div>
  </div>
</div>

<!-- Preview modal -->
<div class="preview-modal" id="preview-modal">
  <div class="preview-box">
    <div class="preview-bar">
      <div style="display:flex;gap:5px"><div style="width:11px;height:11px;border-radius:50%;background:#FF5F56"></div><div style="width:11px;height:11px;border-radius:50%;background:#FFBD2E"></div><div style="width:11px;height:11px;border-radius:50%;background:#27C93F"></div></div>
      <div class="preview-url" id="preview-url"></div>
      <a id="preview-open" href="#" target="_blank" class="btn btn-ghost btn-sm">Открыть ↗</a>
      <button class="btn btn-ghost btn-sm" onclick="closePreview()">×</button>
    </div>
    <iframe class="preview-iframe" id="preview-iframe" src="about:blank" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = window.location.origin;
var genOpen = false;

function toggleGen() {
  genOpen = !genOpen;
  document.getElementById('gen-panel').classList.toggle('open', genOpen);
  if (genOpen) document.getElementById('gen-niche').focus();
}

async function load() {
  document.getElementById('sub-text').textContent = 'Загрузка…';
  try {
    var r = await fetch(API + '/api/sites');
    var j = await r.json();
    if (!j.ok) throw new Error(j.error);
    renderMetrics(j);
    renderTable(j.sites || []);
    document.getElementById('sub-text').textContent =
      j.count + ' сайтов · обновлено ' + new Date().toLocaleTimeString('ru');
  } catch (err) {
    document.getElementById('sub-text').textContent = 'Ошибка: ' + err.message;
    document.getElementById('m-api').style.color = '#A32D2D';
    renderEmpty('Не удалось загрузить', err.message);
  }
}

function renderMetrics(j) {
  document.getElementById('m-total').textContent = j.count || 0;
  document.getElementById('m-today').textContent = j.countToday || 0;
  document.getElementById('m-avg').textContent   = j.avgGenerationMs ? Math.round(j.avgGenerationMs/1000)+'с' : '—';
  document.getElementById('m-api').textContent   = '●';
  document.getElementById('m-api').style.color   = '#2D6A4F';
}

function renderTable(sites) {
  var wrap = document.getElementById('table-body');
  if (!sites.length) {
    renderEmpty('Нет сгенерированных сайтов', 'Нажмите «+ Новый сайт» чтобы создать первый');
    return;
  }
  var rows = sites.map(function(s) {
    var d = new Date(s.generatedAt);
    var date = d.toLocaleDateString('ru') + ' ' + d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    var ms = s.generationMs ? (s.generationMs/1000).toFixed(1)+'с' : '—';
    return '<tr>'
      + '<td><span class="site-id">' + esc(s.siteId) + '</span></td>'
      + '<td class="niche-cell" title="'+esc(s.niche)+'">'+esc(s.niche)+'</td>'
      + '<td><span class="badge badge-ready">● '+esc(s.status||'ready')+'</span></td>'
      + '<td style="color:var(--ink3);font-size:12px">'+date+'</td>'
      + '<td style="color:var(--ink3);font-family:var(--mono);font-size:11px">'+ms+'</td>'
      + '<td><div class="actions">'
      + '<button class="btn btn-ghost btn-sm" onclick="openPreview(\''+esc(s.siteId)+'\')">Просмотр</button>'
      + '<a class="btn btn-ghost btn-sm" href="/api/site/'+esc(s.siteId)+'/blueprint" target="_blank">JSON</a>'
      + '<button class="btn btn-danger btn-sm" onclick="deleteSite(\''+esc(s.siteId)+'\',this)">Удалить</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');

  wrap.innerHTML = '<table>'
    + '<thead><tr>'
    + '<th>Site ID</th><th>Ниша</th><th>Статус</th><th>Создан</th><th>Время</th><th>Действия</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>';
}

function renderEmpty(title, sub) {
  document.getElementById('table-body').innerHTML = '<div class="empty">'
    + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="14" rx="2"/><path d="M3 7h18"/></svg>'
    + '<div class="empty-t">'+esc(title)+'</div>'
    + '<div class="empty-s">'+esc(sub)+'</div></div>';
}

async function generate() {
  var niche = document.getElementById('gen-niche').value.trim();
  var geo   = document.getElementById('gen-geo').value.trim();
  if (!niche) { toast('Введите нишу'); return; }

  var btn = document.getElementById('gen-btn');
  var prog = document.getElementById('progress');
  var stat = document.getElementById('gen-status');
  btn.disabled = true; btn.textContent = 'Генерация…';
  prog.style.width = '0';

  var steps = ['Анализируем нишу…','Строим blueprint…','Генерируем тексты…','Собираем HTML…'];
  var si = 0;
  var ticker = setInterval(function() {
    stat.textContent = steps[si % steps.length]; si++;
    prog.style.width = Math.min(90, si * 22) + '%';
  }, 900);

  try {
    var r = await fetch(API + '/api/site/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ niche: niche, geo: geo || undefined })
    });
    var j = await r.json();
    clearInterval(ticker);

    if (!j.ok) throw new Error(j.error || 'Generation failed');

    prog.style.width = '100%';
    stat.textContent = '✓ Готово за ' + (j.generationMs/1000).toFixed(1) + 'с — ID: ' + j.siteId;
    btn.disabled = false; btn.textContent = 'Создать сайт →';

    toast('Сайт создан: ' + j.siteId);
    document.getElementById('gen-niche').value = '';
    document.getElementById('gen-geo').value = '';
    setTimeout(function() { prog.style.width='0'; stat.textContent=''; }, 4000);
    load();
  } catch (err) {
    clearInterval(ticker);
    prog.style.width = '0';
    stat.textContent = '✗ Ошибка: ' + err.message;
    btn.disabled = false; btn.textContent = 'Создать сайт →';
    toast('Ошибка: ' + err.message);
  }
}

function openPreview(siteId) {
  var url = API + '/api/site/' + siteId + '/preview';
  document.getElementById('preview-url').textContent = url;
  document.getElementById('preview-open').href = url;
  document.getElementById('preview-iframe').src = url;
  document.getElementById('preview-modal').classList.add('open');
}
function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
  document.getElementById('preview-iframe').src = 'about:blank';
}

async function deleteSite(siteId, btn) {
  if (!confirm('Удалить сайт ' + siteId + '?')) return;
  btn.disabled = true; btn.textContent = '…';
  try {
    var r = await fetch(API + '/api/site/' + siteId, { method: 'DELETE' });
    var j = await r.json();
    if (!j.ok) throw new Error(j.error);
    toast('Удалено: ' + siteId);
    load();
  } catch (err) {
    btn.disabled = false; btn.textContent = 'Удалить';
    toast('Ошибка: ' + err.message);
  }
}

var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close preview on overlay click
document.getElementById('preview-modal').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});

// Init
load();
</script>
</body>
</html>
