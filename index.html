<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Alladin · Niche Analyzer</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f4f6fb;margin:0;padding:24px;color:#1f2937}
    .box{max-width:980px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    .row{display:flex;gap:10px}.row input{flex:1;padding:12px;border:1px solid #d1d5db;border-radius:8px}
    .row button{padding:12px 16px;border:0;background:#1d4ed8;color:#fff;border-radius:8px;cursor:pointer}
    pre{margin-top:14px;background:#0b1020;color:#dbeafe;padding:14px;border-radius:10px;overflow:auto}
  </style>
</head>
<body>
  <div class="box">
    <h2>Alladin — визуальный тест анализатора</h2>
    <div class="row">
      <input id="niche" value="бизнес-консультации" placeholder="Введите нишу"/>
      <button id="go">Анализировать</button>
    </div>
    <pre id="out">Ожидание запроса...</pre>
  </div>
  <script>
    const out = document.getElementById('out');
    document.getElementById('go').onclick = async () => {
      const niche = document.getElementById('niche').value.trim();
      out.textContent = 'Запрос...';
      const r = await fetch('/api/analyze', {method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ niche })});
      const j = await r.json();
      out.textContent = JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
